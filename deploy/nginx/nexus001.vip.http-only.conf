# Tosino — nexus001.vip (HTTP 전용, SSL 발급 전·로컬 테스트용)
# 인증서 준비 후: nexus001.vip.conf + certbot 로 교체 권장
#
# 적용: sudo bash scripts/nginx-enable-tosino.sh http
#
# Next 프록시: /api·/uploads·/webhooks·/webhook/sms 는 API/sms-ingest upstream, 그 외 /·/_next 는 Next.
# sms-ingest PM2 기본 :4050 (apps/sms-ingest/.env 의 SMS_INGEST_PORT 와 일치)

upstream tosino_super {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream tosino_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream tosino_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream tosino_solution {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream tosino_agent {
    server 127.0.0.1:3003;
    keepalive 32;
}

upstream tosino_sms_ingest {
    server 127.0.0.1:4050;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_x_forwarded_proto $tosino_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# apex: 솔루션 + API (포트 80)
server {
    listen 80;
    listen [::]:80;
    server_name nexus001.vip www.nexus001.vip;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location /uploads/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location /webhooks/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/vinus {
        proxy_pass http://tosino_api/webhooks/vinus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/sms {
        proxy_pass http://tosino_sms_ingest/webhook/sms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location ~* ^/admin\.html(/.*)?$ {
        return 301 https://mod.nexus001.vip/;
    }

    location ~* ^/index\.html(/.*)?$ {
        return 301 http://$host/;
    }

    location / {
        proxy_pass http://tosino_solution;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

