# ─── HTTPS 443: agent.nexus001.vip → 총판(3003) ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agent.nexus001.vip;

    ssl_certificate     /etc/letsencrypt/live/nexus001.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus001.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
