# Tosino — nexus001.vip
#
# 서버에 반영(배포): 저장소 루트에서  sudo bash scripts/deploy-nginx.sh
# (또는 sudo bash scripts/nginx-enable-tosino.sh https)
#
# DNS
#   mod.tozinosolution.com — 슈퍼어드민(super-admin)
#   nexus001.vip, www      — 솔루션 유저(solution-user)
#   mod.nexus001.vip       — 솔루션어드민(solution-admin)
#   agent.nexus001.vip     — 총판(solution-agent)
#   demo1.nexus001.vip, demo2.nexus001.vip — 솔루션(호스트별 브랜드 등)
#
# 백엔드(포트는 systemd/PM2 등에서 맞춤)
#   슈퍼어드민  super-admin    serve out -l 3000 → 127.0.0.1:3000
#   솔루션어드민 solution-admin serve out -l 3001 → 127.0.0.1:3001
#   솔루션유저   solution-user  serve out -l 3002 → 127.0.0.1:3002  (데모 호스트 공용)
#   총판         solution-agent serve out -l 3003 → 127.0.0.1:3003
#   API Nest :4001 — PM2 ecosystem 에서 cwd=apps/api 로 기동 시 apps/api/.env 로드 (루트 배포: pnpm deploy:server)
#   sms-ingest :4050 — 반가상 은행 문자 POST /webhook/sms (PM2 sms-ingest, apps/sms-ingest/.env 의 SMS_INGEST_PORT 와 일치)
#
# 외부 접속: 방화벽·클라우드 보안그룹에서 **80·443 만** 열면 됨. 3002 는 로컬만(nginx→루프백).
# 인터넷에 3002 를 직접 노출할 필요 없음 — 안 되는 경우는 대개 443 이 막혀 있거나 DNS 가 다른 IP 임.
#
# Nest는 /api 접두사(auth·platforms·public 등). /health·/webhooks·/webhook/vinus·/webhook/sms·/uploads 는 루트.
# Vinus 콜백 정식 경로: POST /webhooks/vinus (복수). /webhook/vinus 는 흔한 오타 호환.
#
# Next(솔루션·관리자·총판) 프록시: 반드시 /api·/uploads·/webhooks·/webhook/sms 가 location / 보다 위에 있어야 함.
# ./ _next/static·/_next/image·/favicon 등은 location / 로 upstream(Next)에 그대로 전달됨.
#
# 환경 변수
#   apps/api/.env
#     PUBLIC_API_URL=https://nexus001.vip
#   super-admin / solution-admin / solution-user / solution-agent 빌드 시
#     NEXT_PUBLIC_API_URL=https://nexus001.vip/api
#
# 인증서: super-admin + solution root/mod/agent + 데모 서브도메인을 한 번에
#   sudo certbot certonly --nginx -d nexus001.vip -d www.nexus001.vip \
#     -d mod.nexus001.vip -d agent.nexus001.vip -d mod.tozinosolution.com \
#     -d demo1.nexus001.vip -d demo2.nexus001.vip
#   또는 와일드카드: -d nexus001.vip -d *.nexus001.vip  (DNS challenge)
#
# 서버에 적용 (저장소 루트에서) — 기존 default 등과 충돌 시:
#   sudo bash scripts/nginx-migrate-to-tosino.sh http
# 단순 링크만:
#   sudo bash scripts/nginx-enable-tosino.sh http
# SSL: conf 안 경로는 live/nexus001.vip 기준. certbot 폴더명이 다르면:
#   sudo bash scripts/nginx-enable-tosino.sh https 실제폴더명
# 인증서 없을 때: sudo bash scripts/nginx-enable-tosino.sh http
# 수동: sudo ln -sf /절대경로/tosino/deploy/nginx/nexus001.vip.conf /etc/nginx/sites-enabled/tosino-nexus001.vip.conf
#       sudo nginx -t && sudo systemctl reload nginx
# 로컬에서 가상 호스트 검증(서버에서):
#   curl -sk --resolve nexus001.vip:443:127.0.0.1 https://nexus001.vip/health
# /health 는 **각 호스트의 server_name** 으로 요청 (IP 직접 접속은 불일치로 404 가능)
# 포트 80 은 super·apex·mod·agent·demo 별 **별도 server 블록** — 트래픽이 서로 섞이지 않게 함

upstream tosino_super {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream tosino_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream tosino_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

upstream tosino_solution {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream tosino_agent {
    server 127.0.0.1:3003;
    keepalive 32;
}

upstream tosino_sms_ingest {
    server 127.0.0.1:4050;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 클라이언트가 HTTPS 로 볼 때 Next 가 http 절대 URL 을 내지 않게 함 (CF Flexible 등에서 $scheme 만 http 인 경우 CSS·JS 차단).
map $http_x_forwarded_proto $tosino_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# ─── HTTP 80: server_name 을 호스트별로 분리 (한 블록에 mod·apex 를 섞으면 일부 환경에서 Host/리다이렉트가 꼬일 수 있음) ───

server {
    listen 80;
    listen [::]:80;
    server_name nexus001.vip www.nexus001.vip;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/vinus {
        proxy_pass http://tosino_api/webhooks/vinus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/sms {
        proxy_pass http://tosino_sms_ingest/webhook/sms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location ~* ^/admin\.html(/.*)?$ {
        return 301 https://mod.nexus001.vip/;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

