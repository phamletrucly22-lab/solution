# ─── HTTPS 443: apex 만 솔루션(3002). mod 는 아래 별도 블록 ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus001.vip www.nexus001.vip;

    # 폴더명은 certbot 과 일치해야 함 (다르면 nginx-enable-tosino.sh https 폴더명)
    ssl_certificate     /etc/letsencrypt/live/nexus001.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexus001.vip/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location /uploads/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location /webhooks/ {
        proxy_pass http://tosino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/vinus {
        proxy_pass http://tosino_api/webhooks/vinus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /webhook/sms {
        proxy_pass http://tosino_sms_ingest/webhook/sms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    location = /health {
        proxy_pass http://tosino_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
    }

    # 레거시 정적 admin (대소문자·경로 변형)
    location ~* ^/admin\.html(/.*)?$ {
        return 301 https://mod.nexus001.vip/;
    }

    # 옛 index.html 이 admin 으로 넘기던 경우 → 솔루션 루트로
    location ~* ^/index\.html(/.*)?$ {
        return 301 https://$host/;
    }

    location / {
        proxy_pass http://tosino_solution;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $tosino_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}

