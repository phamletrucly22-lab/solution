# HTTP 80: agent → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name agent.nexus001.vip;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://agent.nexus001.vip$request_uri;
    }
}
