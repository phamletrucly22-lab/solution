services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tosino
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # API(BullMQ)·로컬 개발용. 호스트에 이미 Redis가 있으면 이 서비스는 끄고 REDIS_URL 만 맞추면 됩니다.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
